name: Server CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    working-directory: server

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Provider contracts
        run: pnpm test:providers

      - name: Integration tests
        run: pnpm test:integration

      - name: Vertical slice
        run: pnpm test:vertical

      - name: Full test suite
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Diff check
        working-directory: .
        run: git diff --check

      - name: Verify generated state
        run: |
          git diff --exit-code -- pnpm-lock.yaml
          test -z "$(git status --porcelain)"
